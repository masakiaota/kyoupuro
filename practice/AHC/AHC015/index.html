<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>heuristic contest Visualizer Template</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --line: #d1d5db;
        --text: #111827;
        --muted: #4b5563;
        --accent: #0f766e;
        --danger: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
        background: linear-gradient(180deg, #eef4f7 0%, #f9fafb 100%);
        color: var(--text);
      }
      .wrap {
        max-width: 1500px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 16px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 20px;
      }
      .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
      label { font-size: 13px; color: var(--muted); min-width: 74px; }
      .top-controls {
        flex-wrap: wrap;
      }
      .top-controls label {
        min-width: 52px;
      }
      .top-controls select {
        width: 96px;
      }
      .top-controls input[type="number"] {
        width: 120px;
      }
      .top-controls button {
        flex: 1 1 calc(50% - 4px);
        min-width: 0;
      }
      .bin-controls {
        flex-wrap: wrap;
      }
      .bin-controls label {
        min-width: 74px;
      }
      .bin-controls select {
        flex: 1 1 180px;
        min-width: 140px;
      }
      .bin-controls button {
        flex: 1 1 calc(50% - 4px);
        min-width: 0;
      }
      .view-controls label {
        min-width: auto;
      }
      #runStatus {
        font-size: 12px;
        color: var(--muted);
      }
      input[type="number"], select, button {
        height: 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 10px;
        font-size: 14px;
        background: #fff;
      }
      button {
        cursor: pointer;
        background: #ecfeff;
        border-color: #99f6e4;
      }
      button:hover { background: #cffafe; }
      button.is-active {
        background: #0f766e;
        color: #fff;
        border-color: #0f766e;
      }
      button.is-active:hover {
        background: #115e59;
      }
      input[type="range"] {
        accent-color: #0f766e;
      }
      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #0f766e;
      }
      .row.compact label {
        min-width: auto;
      }
      textarea {
        width: 100%;
        min-height: 170px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        font-family: "SFMono-Regular", Menlo, monospace;
        font-size: 12px;
        line-height: 1.4;
        background: #fff;
      }
      .mono { font-family: "SFMono-Regular", Menlo, monospace; }
      #turnValue { min-width: 48px; text-align: right; }
      #score { font-weight: 700; font-size: 18px; color: var(--accent); }
      #error { color: var(--danger); font-size: 13px; white-space: pre-wrap; }
      #svgHost {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        min-height: 760px;
        overflow: auto;
      }
      @media (max-width: 1100px) {
        .wrap { grid-template-columns: 1fr; }
        #svgHost { min-height: 500px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <h1>heuristic contest Visualizer Template</h1>

        <div class="row top-controls">
          <label for="problem">Problem</label>
          <select id="problem">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
          <label for="seed">Seed</label>
          <input id="seed" type="number" value="0" min="0" step="1" />
          <button id="genBtn">生成</button>
          <button id="sampleBtn">サンプル</button>
        </div>

        <div class="row bin-controls">
          <label for="rustBin">Rust bin</label>
          <select id="rustBin"></select>
          <button id="refreshBinsBtn">bin更新</button>
          <button id="runBinBtn">bin実行→Output反映</button>
        </div>
        <div id="runStatus"></div>

        <div class="row compact view-controls">
          <label for="viewMode">View</label>
          <select id="viewMode">
            <option value="1">1: 担当領域</option>
            <option value="2">2: 重複度</option>
            <option value="3">3: ロボット単体</option>
          </select>
          <label for="focusRobot">Robot</label>
          <select id="focusRobot"></select>
        </div>

        <div class="row">
          <label for="turn">Turn</label>
          <input id="turn" type="range" min="0" max="0" value="0" style="flex:1" />
          <span id="turnValue" class="mono">0</span>
          <span class="mono" style="color:#6b7280">/</span>
          <span id="maxTurnValue" class="mono" style="color:#6b7280">0</span>
        </div>

        <div class="row compact">
          <button id="prevBtn" title="1ターン戻る">◀</button>
          <button id="playBtn" title="再生/停止">再生</button>
          <button id="nextBtn" title="1ターン進む">▶</button>
          <label for="speed" style="margin-left:4px">速度</label>
          <select id="speed">
            <option value="2">x2</option>
            <option value="5" selected>x5</option>
            <option value="10">x10</option>
            <option value="20">x20</option>
            <option value="40">x40</option>
          </select>
          <input id="loopPlay" type="checkbox" checked />
          <label for="loopPlay">ループ</label>
        </div>

        <div class="row"><label>Score</label><span id="score" class="mono">-</span></div>
        <div class="row"><label>Error</label><span id="error"></span></div>

        <div style="margin-top:10px; font-size:13px; color:#4b5563">Input</div>
        <textarea id="inputArea" spellcheck="false"></textarea>

        <div style="margin-top:10px; font-size:13px; color:#4b5563">Output</div>
        <textarea id="outputArea" spellcheck="false"></textarea>
      </div>

      <div class="panel">
        <div id="svgHost"></div>
      </div>
    </div>

    <script type="module" src="/src_vis/main.js"></script>
  </body>
</html>
