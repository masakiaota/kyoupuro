<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>King's Tour Visualizer</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --line: #d1d5db;
        --text: #111827;
        --muted: #4b5563;
        --accent: #0f766e;
        --danger: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", sans-serif;
        background: linear-gradient(180deg, #eef4f7 0%, #f9fafb 100%);
        color: var(--text);
      }
      .wrap {
        max-width: 1550px;
        margin: 0 auto;
        padding: 16px;
        display: grid;
        grid-template-columns: 420px 1fr;
        gap: 16px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 22px;
      }
      .sub {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin: 8px 0;
        flex-wrap: wrap;
      }
      label { font-size: 13px; color: var(--muted); min-width: 78px; }
      input[type="number"], select, button {
        height: 32px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 10px;
        font-size: 14px;
        background: #fff;
      }
      button {
        cursor: pointer;
        background: #ecfeff;
        border-color: #99f6e4;
      }
      button:hover { background: #cffafe; }
      button.is-active {
        background: #0f766e;
        color: #fff;
        border-color: #0f766e;
      }
      button.is-active:hover { background: #115e59; }
      input[type="range"] { accent-color: #0f766e; }
      input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #0f766e;
      }
      textarea {
        width: 100%;
        min-height: 170px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        font-family: "SFMono-Regular", Menlo, monospace;
        font-size: 12px;
        line-height: 1.4;
        background: #fff;
      }
      .mono { font-family: "SFMono-Regular", Menlo, monospace; }
      #turnValue { min-width: 48px; text-align: right; }
      #score { font-weight: 700; font-size: 18px; color: var(--accent); }
      #error { color: var(--danger); font-size: 13px; white-space: pre-wrap; }
      #runStatus { font-size: 12px; color: var(--muted); }
      .hint {
        margin: 6px 0 2px;
        color: #475569;
        font-size: 12px;
        line-height: 1.4;
      }
      #svgHost {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        min-height: 820px;
        overflow: hidden;
        position: relative;
        touch-action: none;
      }
      #mainCanvas {
        width: 100%;
        height: 100%;
        display: block;
        user-select: none;
        cursor: grab;
      }
      @media (max-width: 1100px) {
        .wrap { grid-template-columns: 1fr; }
        #svgHost { min-height: 560px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <h1>King's Tour Visualizer</h1>
        <p class="sub">パン: ドラッグ / ズーム: ホイール / Shift+←→: 10ターン移動</p>

        <div class="row">
          <label for="seed">Seed</label>
          <input id="seed" type="number" value="0" min="0" step="1" />
          <button id="genBtn">入力生成</button>
          <button id="sampleBtn">サンプル</button>
        </div>

        <div class="row">
          <label for="caseFile">Case</label>
          <select id="caseFile" style="flex: 1 1 160px"></select>
          <button id="refreshCasesBtn">case更新</button>
        </div>

        <div class="row">
          <label for="rustBin">Rust bin</label>
          <select id="rustBin" style="flex: 1 1 180px"></select>
          <button id="refreshBinsBtn">bin更新</button>
          <button id="runBinBtn">bin実行→Output反映</button>
        </div>
        <div id="runStatus"></div>

        <div class="row">
          <label for="viewMode">表示</label>
          <select id="viewMode">
            <option value="1">1: A値ヒートマップ</option>
            <option value="2">2: 訪問順ヒートマップ</option>
            <option value="3">3: 重複/違反チェック</option>
          </select>
          <button id="fitBtn">表示を合わせる</button>
          <button id="resetViewBtn">ズームリセット</button>
          <span class="mono" id="zoomValue">100%</span>
        </div>

        <div class="row">
          <label for="turn">Turn</label>
          <input id="turn" type="range" min="0" max="0" value="0" style="flex:1" />
          <span id="turnValue" class="mono">0</span>
          <span class="mono" style="color:#6b7280">/</span>
          <span id="maxTurnValue" class="mono" style="color:#6b7280">0</span>
        </div>

        <div class="row">
          <button id="prevBtn" title="1ターン戻る">◀</button>
          <button id="playBtn" title="再生/停止">再生</button>
          <button id="nextBtn" title="1ターン進む">▶</button>
          <label for="speed" style="min-width:auto">速度</label>
          <select id="speed">
            <option value="10">x10</option>
            <option value="100">x100</option>
            <option value="1000" selected>x1000</option>
            <option value="2000">x2000</option>
          </select>
          <input id="loopPlay" type="checkbox" checked />
          <label for="loopPlay" style="min-width:auto">ループ</label>
        </div>

        <div class="row"><label>Score</label><span id="score" class="mono">-</span></div>
        <div class="row"><label>Error</label><span id="error"></span></div>
        <p class="hint">SVG下部に「kごとの獲得スコア(青) / 累積V(橙)」グラフを表示し、現在ターンの赤線が連動する。</p>

        <div style="margin-top:10px; font-size:13px; color:#4b5563">Input</div>
        <textarea id="inputArea" spellcheck="false"></textarea>

        <div style="margin-top:10px; font-size:13px; color:#4b5563">Output</div>
        <textarea id="outputArea" spellcheck="false"></textarea>
      </div>

      <div class="panel">
        <div id="svgHost"><canvas id="mainCanvas"></canvas></div>
      </div>
    </div>

    <script type="module" src="/src_vis/main.js"></script>
  </body>
</html>
