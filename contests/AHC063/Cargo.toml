[profile.release]
lto = true # コンパイル時間が著しく長くなってしまう場合は無し

[package]
name = "main"
version = "0.0.0"
edition = "2024"
publish = false

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(profile_counts)'] }

# `src/bin` の top-level は solver 候補を見渡しやすく保ち、
# 補助的な bin は `src/bin/adhoc` に隔離して名前だけ維持する。
